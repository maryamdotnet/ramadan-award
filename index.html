<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جائزة رمضان</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html, body {
            height: 100%;
            overflow-x: hidden
        }

        body {
            font-family: 'Tajawal',sans-serif;
            background: #f5efe4;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                background: radial-gradient(circle at 25% 25%,rgba(200,134,10,.08) 0%,transparent 55%),radial-gradient(circle at 75% 75%,rgba(74,144,164,.07) 0%,transparent 55%)
            }

        /* ── SCREEN SYSTEM ── */
        .screen {
            width: 100%;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            transition: opacity .35s ease,transform .35s ease
        }

            .screen.hidden {
                display: none
            }

        /* ── SCREEN 1: INPUT ── */
        #s1 {
            justify-content: center;
            padding: 2rem 1rem 3rem
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 2.2rem
        }

        .logo-title {
            font-family: 'Amiri Quran',serif;
            font-size: clamp(2.2rem,8vw,3.8rem);
            color: #5c2d0a;
            /*letter-spacing: .06em;*/
            line-height: 1.15;
            text-shadow: 1px 2px 0 rgba(200,134,10,.2)
        }

        .logo-sub {
            font-size: clamp(.85rem,3vw,1rem);
            color: #8a6040;
            margin-top: .85rem;
            font-weight: 500
        }

        .input-box {
            width: 92%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: .7rem;
            margin-bottom: 1.4rem
        }

        .name-input {
            width: 100%;
            padding: .95rem 1.2rem;
            font-family: 'Tajawal',sans-serif;
            font-size: 1.08rem;
            font-weight: 700;
            text-align: center;
            background: #fff8ee;
            border: 2.5px solid #c8a06a;
            border-radius: 16px;
            color: #3a1e08;
            outline: none;
            direction: rtl;
            transition: border-color .3s,box-shadow .3s;
            box-shadow: 0 2px 10px rgba(180,120,40,.1)
        }

            .name-input::placeholder {
                color: rgba(100,60,20,.32)
            }

            .name-input:focus {
                border-color: #c8860a;
                box-shadow: 0 0 0 3px rgba(200,134,10,.16),0 2px 14px rgba(180,120,40,.13)
            }

        .go-btn {
            padding: .95rem;
            font-family: 'Tajawal',sans-serif;
            font-size: 1.08rem;
            font-weight: 900;
            color: #fff8ee;
            background: linear-gradient(135deg,#b86e08 0%,#d4900e 55%,#a05c06 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(180,110,8,.33),0 2px 0 #7a4004;
            transition: transform .15s,box-shadow .15s;
            letter-spacing: .04em
        }

            .go-btn:active {
                transform: translateY(2px);
                box-shadow: 0 1px 6px rgba(180,110,8,.25)
            }

        .chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: .42rem;
            width: 92%;
            max-width: 400px
        }

        .chip {
            padding: .32rem .85rem;
            border: 1.5px solid rgba(180,110,8,.28);
            border-radius: 20px;
            font-size: .82rem;
            color: #8a5010;
            cursor: pointer;
            background: rgba(200,134,10,.07);
            transition: background .2s,border-color .2s;
            font-weight: 600
        }

            .chip:active {
                background: rgba(200,134,10,.2)
            }

        /* ── SCREEN 2: CARD ── */
        #s2 {
            justify-content: flex-start;
            padding: 1.2rem .8rem 2.5rem;
            gap: .9rem
        }

        .back-btn {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem .9rem;
            font-family: 'Tajawal',sans-serif;
            font-size: .9rem;
            font-weight: 700;
            color: #5c2d0a;
            background: #fff8ee;
            border: 1.5px solid #c8a06a;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 1px 6px rgba(180,120,40,.1);
            transition: background .2s
        }

            .back-btn:active {
                background: #ffe8c8
            }

        /* ── AWARD CARD ── */
        .card-wrap {
            width: 100%;
            max-width: 420px
        }

        .card {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 18px 55px rgba(60,30,0,.25),0 3px 10px rgba(60,30,0,.12);
            animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.75) translateY(22px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        /* FRAME: the checkerboard SVG border */
        .frame-svg-wrap {
            position: relative;
            line-height: 0
        }

            .frame-svg-wrap svg.frame-svg {
                width: 100%;
                display: block
            }
        /* the inner content sits absolutely over the SVG border area */
        .frame-inner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: stretch
        }

        .inner-panel {
            flex: 1;
            margin: 11.5%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1.3rem .8rem 1.2rem;
            transition: background .6s
        }

        .award-label {
            font-family: 'Amiri Quran',serif;
            font-size: clamp(1.2rem,4.5vw,1.65rem);
            color: #fff;
            text-shadow: 1px 1px 4px rgba(0,0,0,.6);
            margin-bottom: 0;
            /*letter-spacing: .04em*/
        }

        .trophy-wrap {
            width: min(72%,185px);
            position: relative;
            animation: trophyBob 3.5s ease-in-out infinite;
            filter: drop-shadow(0 7px 20px rgba(0,0,0,.5))
        }

        @keyframes trophyBob {
            0%,100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-6px)
            }
        }

        .rays {
            position: absolute;
            top: -5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            align-items: flex-end;
            pointer-events: none
        }

        .ray {
            width: 2.5px;
            border-radius: 2px;
            background: linear-gradient(to top,#f0c040,transparent);
            animation: rayPulse 2.2s ease-in-out infinite
        }

            .ray:nth-child(1) {
                height: 20px;
                animation-delay: 0s
            }

            .ray:nth-child(2) {
                height: 32px;
                animation-delay: .15s
            }

            .ray:nth-child(3) {
                height: 42px;
                animation-delay: .3s
            }

            .ray:nth-child(4) {
                height: 32px;
                animation-delay: .15s
            }

            .ray:nth-child(5) {
                height: 20px;
                animation-delay: 0s
            }

        @keyframes rayPulse {
            0%,100% {
                opacity: .28
            }

            50% {
                opacity: .95
            }
        }

        .plaque {
            width: 100%;
            margin-top: 0;
            background: linear-gradient(160deg,#7a3d18 0%,#4e2008 45%,#7a3d18 100%);
            border-radius: 9px;
            border: 3px solid #2a1104;
            box-shadow: inset 0 2px 6px rgba(255,255,255,.07),inset 0 -2px 6px rgba(0,0,0,.42),0 4px 12px rgba(0,0,0,.38);
            padding: .75rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden
        }

            .plaque::before {
                content: '';
                position: absolute;
                top: 0;
                left: 12%;
                right: 12%;
                height: 1px;
                background: linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)
            }

        .plaque-name {
            font-size: clamp(.9rem,3.4vw,1.08rem);
            color: #f5c842;
            font-weight: 800;
            margin-bottom: .22rem;
            opacity: 0;
            animation: riseIn .5s .42s ease forwards
        }

        .plaque-text {
            font-family: 'Amiri Quran',serif;
            font-size: clamp(1rem,3.8vw,1.28rem);
            color: #fff;
            line-height: 1.8;
            white-space: pre-line;
            text-shadow: 1px 1px 3px rgba(0,0,0,.65);
            opacity: 0;
            animation: riseIn .5s .62s ease forwards
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(7px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── ACTION BUTTONS ── */
        .action-row {
            display: flex;
            gap: .65rem;
            width: 100%;
            max-width: 420px
        }

        .act-btn {
            flex: 1;
            padding: .85rem .5rem;
            font-family: 'Tajawal',sans-serif;
            font-size: .95rem;
            font-weight: 800;
            border: none;
            border-radius: 13px;
            cursor: pointer;
            transition: transform .15s,box-shadow .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .4rem
        }

            .act-btn:active {
                transform: translateY(1px)
            }

        .btn-save {
            background: linear-gradient(135deg,#b86e08,#d4900e,#a05c06);
            color: #fff8ee;
            box-shadow: 0 4px 16px rgba(180,110,8,.3),0 2px 0 #7a4004
        }

        .btn-again {
            background: #fff8ee;
            color: #5c2d0a;
            border: 2px solid #c8a06a;
            box-shadow: 0 2px 8px rgba(180,120,40,.1)
        }

        /* ── CONFETTI ── */
        #confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999
        }

        /* saving overlay */
        .saving-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem
        }

            .saving-overlay.show {
                display: flex
            }

        .saving-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,.25);
            border-top-color: #f5c842;
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .saving-text {
            color: #fff;
            font-family: 'Tajawal',sans-serif;
            font-size: 1rem;
            font-weight: 700
        }
    </style>
</head>
<body>

        <div class="saving-spinner"></div>

    </div>

            <button class="go-btn" onclick="generate()">🌙 احصل على الجائزة</button>
        </div>
        <div class="chips" id="chips"></div>

    <script>
        /* ══════════════════════════════════════
           THEMES — 5 palettes from illustrations
           ══════════════════════════════════════ */
        const THEMES = [
            // Brown + blue stars
            {
                inner: '#3a1808', frameOuter: '#2a1508', frameInner: '#3d2010',
                cellA: '#3a1e0c', cellB: '#d4bc88',
                starFill: '#7ab3cc', moonFill: '#d8c478', textCol: '#fff'
            },
            // Teal + orange stars
            {
                inner: '#1a4a58', frameOuter: '#0e3545', frameInner: '#1a5065',
                cellA: '#1a5065', cellB: '#c8be8a',
                starFill: '#e05c2a', moonFill: '#d8c478', textCol: '#fff'
            },
            // Navy + red squares + gold stars
            {
                inner: '#1e2d50', frameOuter: '#17223a', frameInner: '#c0351a',
                cellA: '#c0351a', cellB: '#253565',
                starFill: '#c8a820', moonFill: '#d8c478', textCol: '#fff'
            },
            // Plum + pink
            {
                inner: '#2d1045', frameOuter: '#1e0a30', frameInner: '#2d1045',
                cellA: '#2a0e40', cellB: '#cfc288',
                starFill: '#e060a0', moonFill: '#d8c478', textCol: '#fff'
            },
            // Forest + gold
            {
                inner: '#1c3828', frameOuter: '#0e2218', frameInner: '#1c3828',
                cellA: '#1a3522', cellB: '#cec882',
                starFill: '#f0a500', moonFill: '#d8c478', textCol: '#fff'
            },
        ];

        /* ══════════════════════════════════════
           BUILD CHECKERBOARD SVG BORDER
           Key: ALL cells are squares, each has either a 4-point star or crescent
           matching junora's illustration exactly
           ══════════════════════════════════════ */
        function buildFrameSVG(t, totalW, totalH) {
            const COLS = 7, ROWS = 9;
            const cellW = totalW / COLS;
            const cellH = totalH / ROWS;
            const cs = Math.min(cellW, cellH);

            // SVG star path (4-point, centered at 0,0, size ~r)
            function starPath(r) {
                const o = r * 0.38;
                return `M0,${-r} L${o},${-o} L${r},0 L${o},${o} L0,${r} L${-o},${o} L${-r},0 L${-o},${-o} Z`;
            }
            // Crescent: two overlapping circles
            function crescent(r) {
                const r2 = r * 0.78, dx = r * 0.38;
                return `<circle cx="0" cy="0" r="${r}" fill="MOONFILL"/>
                <circle cx="${dx}" cy="${-r * 0.14}" r="${r2}" fill="INNERFILL"/>`;
            }

            let cells = '';
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const isEdge = row === 0 || row === ROWS - 1 || col === 0 || col === COLS - 1;
                    if (!isEdge) continue; // only border cells

                    const isA = (row + col) % 2 === 0;
                    const bg = isA ? t.cellA : t.cellB;
                    const cx = col * cellW + cellW / 2;
                    const cy = row * cellH + cellH / 2;
                    const iconR = cs * 0.28;

                    cells += `<rect x="${col * cellW}" y="${row * cellH}" width="${cellW}" height="${cellH}" fill="${bg}"/>`;

                    if (isA) {
                        // 4-point star
                        const fill = t.starFill;
                        cells += `<path d="${starPath(iconR)}" fill="${fill}" transform="translate(${cx},${cy})"/>`;
                    } else {
                        // crescent moon
                        const moonC = t.moonFill;
                        const innerC = bg;
                        const moon = crescent(iconR).replace(/MOONFILL/g, moonC).replace(/INNERFILL/g, innerC);
                        cells += `<g transform="translate(${cx},${cy})">${moon}</g>`;
                    }
                }
            }

            // Inner rect cutout (middle 5×9 area is the content area)
            const ix = cellW, iy = cellH;
            const iw = totalW - 2 * cellW, ih = totalH - 2 * cellH;

            return `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="display:block;width:100%;height:auto">
        ${cells}
        <rect x="${ix}" y="${iy}" width="${iw}" height="${ih}" rx="6" fill="${t.inner}"/>
      </svg>`;
        }

        function renderFrame(t) {
            const wrap = document.getElementById("frameSvgWrap");
            const innerPanel = document.getElementById("innerPanel");
            if (innerPanel && innerPanel.parentNode) innerPanel.parentNode.removeChild(innerPanel);
            const W = wrap.offsetWidth || 380;
            const cellSize = Math.floor(W / 7);
            const H = cellSize * 9;
            wrap.style.height = H + "px";
            wrap.innerHTML = buildFrameSVG(t, cellSize * 7, H);
            const fi = document.createElement("div");
            fi.className = "frame-inner";
            fi.appendChild(innerPanel);
            wrap.appendChild(fi);
            innerPanel.style.background = t.inner;
        }

        /* ══════════════════════════════════════
           AWARDS DATABASE
           ══════════════════════════════════════ */
        const NAMED = [
            {
                keys: ['امي', 'أمي', 'ماما', 'mama', 'mom', 'mother', 'عائشة', 'عائشه', 'عايشة', 'عايشه'],
                text: 'لأنك أبدعتِ بالجلابيات\n  يا أحلى فاشنستا'
            },
            {
                keys: ['ابوي', 'أبوي', 'بابا', 'ابي', 'أبي', 'dad', 'father', 'سلمان'],
                text: 'لأنك كملت صيام رغم الظروف\nما شاء الله عليك  '
            },
            {
                keys: ['صالح', 'saleh', 'salih', 'صلوح'],
                text: 'لأنك تصوم وتداوم\nما شاء الله عليك يا بطل '
            },
            {
                keys: ['عبدالرحمن', 'عبد الرحمن', 'abdulrahman', 'abdurrahman'],
                text: 'لأنك لبيت نداء الوطن\n وأنت صايم الله يكتب أجرك   '
            },
            {
                keys: ['ملوك', 'ملوك', 'مالك', 'عبدالملك', 'عبد الملك'],
                text: 'لأنك اعتمرت في العشر الأواخر\nالله يتقبل منك  '
            },
            {
                keys: ['عزوز', 'عزيز', 'aziz', 'azooz', 'عبد العزيز', 'عبدالعزيز', 'عز'],
                text: 'لأنك ما قصّرت بالمشاوير\nمن التراويح للسحور '
            },
            {
                keys: ['ميمونة', 'ميمونه', 'maimona', 'maymona', 'مون'],
                text: 'لأنك سبّاقة للخير دايمًا\nالله يكتب أجرك   '
            },
            {
                keys: ['مها', 'maha'],
                text: 'لأنكِ أقوى شيف \nوأبدعتِ بتنوع الأطباق'
            },
            {
                keys: ['تهاني', 'تهاني', 'tahani'],
                text: 'لأنك تصومين وتداومين\nما شاء الله عليكِ يا قوية'
            },
            {
                keys: ['سعد', 'saad', 'sad'],
                text: 'لأنك ختمت كل ممشى بعنيزة\nوقفّلت مليون خطوة'
            },
            {
                keys: ['ميمي', 'مريم', 'انا', 'أنا'],
                text: 'لأنكِ تستاهلين كل خير\nيا الملكة 👑'
            },
            {
                keys: ['روري', 'rori', 'rory', 'أروى', 'اروى'],
                text: 'لأنك تذاكرين وتختبرين\nوأنتِ صايمة يا بطلة'
            },
            {
                keys: ['سلطان', 'sultan'],
                text: 'لأنك تقضي مشاوير السوبرماركت\n كل عصرية '
            },
            {
                keys: ['رسيل', 'raseel', 'rasil'],
                text: 'لأنكِ ملكة التورتيلا بلا منازع  '
            },
        ];
        const GENERIC = ['اسمك مو موجود بالقائمة\nلكن لك أجر الصيام إن شاء الله '];

        let tIdx = 0, curName = '', curText = '';

        function findAward(n) {
            const q = n.trim().toLowerCase();
            for (const a of NAMED) if (a.keys.some(k => q.includes(k.toLowerCase()) || k.toLowerCase().includes(q))) return a.text;
            let h = 0; for (const c of n) h = (h * 31 + c.charCodeAt(0)) >>> 0;
            return GENERIC[h % GENERIC.length];
        }

        /* ══════════════════════════════════════
           CONFETTI
           ══════════════════════════════════════ */
        function runConfetti() {
            const cv = document.getElementById('confetti');
            cv.width = innerWidth; cv.height = innerHeight;
            const ctx = cv.getContext('2d');
            const C = ['#c8860a', '#e05c2a', '#7ab3cc', '#fff', '#FF69B4', '#27AE60', '#f5cc50', '#c0351a'];
            const p = Array.from({ length: 80 }, () => ({
                x: Math.random() * cv.width, y: -20 - Math.random() * 120,
                vx: (Math.random() - .5) * 5, vy: 3 + Math.random() * 4,
                col: C[Math.floor(Math.random() * C.length)],
                w: 5 + Math.random() * 9, h: 4 + Math.random() * 5,
                rot: Math.random() * Math.PI * 2, rv: (Math.random() - .5) * .18, a: 1
            }));
            let f = 0;
            (function loop() {
                ctx.clearRect(0, 0, cv.width, cv.height);
                p.forEach(q => {
                    q.x += q.vx; q.y += q.vy; q.rot += q.rv;
                    if (q.y > cv.height * .65) q.a -= .025; if (q.a <= 0) return;
                    ctx.globalAlpha = q.a; ctx.fillStyle = q.col;
                    ctx.save(); ctx.translate(q.x, q.y); ctx.rotate(q.rot);
                    ctx.fillRect(-q.w / 2, -q.h / 2, q.w, q.h); ctx.restore();
                });
                ctx.globalAlpha = 1;
                if (++f < 130) requestAnimationFrame(loop);
                else ctx.clearRect(0, 0, cv.width, cv.height);
            })();
        }

        /* ══════════════════════════════════════
           NAVIGATION
           ══════════════════════════════════════ */
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.add('hidden');
                s.style.display = 'none';
            });
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            el.style.display = 'flex';
            window.scrollTo(0, 0);
        }

        function goBack() {
            showScreen('s1');
            document.getElementById('nameInput').value = '';
            document.getElementById('nameInput').focus();
        }

        /* ══════════════════════════════════════
           GENERATE
           ══════════════════════════════════════ */
        function generate() {
            const inp = document.getElementById('nameInput');
            const name = inp.value.trim();
            if (!name) {
                inp.style.borderColor = '#e05c2a'; inp.focus();
                setTimeout(() => inp.style.borderColor = '#c8a06a', 900); return;
            }
            curName = name; curText = findAward(name);
            tIdx = (tIdx + 1) % THEMES.length;
            const t = THEMES[tIdx];

            // Switch to card screen first (so element is visible/has width)
            showScreen('s2');

            // Animate card
            const card = document.getElementById('card');
            card.style.animation = 'none'; card.offsetHeight;
            card.style.animation = 'popIn .6s cubic-bezier(.34,1.56,.64,1) both';

            // Double rAF ensures element is painted and has measured width
            requestAnimationFrame(() => requestAnimationFrame(() => {
                renderFrame(t);
                const pn = document.getElementById('plaqueName'), pt = document.getElementById('plaqueText');
                pn.style.animation = 'none'; pt.style.animation = 'none'; pn.offsetHeight;
                pn.textContent = '🏆 ' + name;
                pt.textContent = curText;
                pn.style.animation = 'riseIn .5s .42s ease forwards';
                pt.style.animation = 'riseIn .5s .62s ease forwards';
            }));

            runConfetti();
        }

        /* ══════════════════════════════════════
        SAVE AS IMAGE using html-to-image
        ══════════════════════════════════════ */
        async function saveImage() {
            const overlay = document.getElementById('savingOverlay');
            overlay.classList.add('show');
            try {
                const card = document.getElementById('card');

                const dataUrl = await htmlToImage.toPng(card, {
                    pixelRatio: 3, 
                    quality: 1.0,
                    style: {
                        transform: 'none' 
                    }
                });

                const link = document.createElement('a');
                link.download = 'جائزة-رمضان-' + document.getElementById('nameInput').value + '.png';
                link.href = dataUrl;
                link.click();
            } catch (e) {
                console.error('Error generating image:', e);
                // Fallback: share as text
                const text = '🏆 جائزة رمضان 🌙\n\n' + document.getElementById('nameInput').value + '\n\n#جائزة_رمضان';
                if (navigator.share) { navigator.share({ title: 'جائزة رمضان', text }); }
                else { navigator.clipboard?.writeText(text); alert('تم نسخ الجائزة!'); }
            } finally {
                overlay.classList.remove('show');
            }
        }

        /* ══════════════════════════════════════
           INIT
           ══════════════════════════════════════ */
        document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

        ['ماما', 'بابا', 'صالح', 'عبدالرحمن', 'مالك', 'عزوز', 'ميمونة', 'مها', 'تهاني', 'سعد', 'ميمي', 'روري', 'سلطان', 'رسيل'].forEach(n => {
            const c = document.createElement('div'); c.className = 'chip'; c.textContent = n;
            c.onclick = () => { document.getElementById('nameInput').value = n; generate(); };
            document.getElementById('chips').appendChild(c);
        });
